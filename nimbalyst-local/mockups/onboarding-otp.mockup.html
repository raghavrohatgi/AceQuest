<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AceQuest — Verify OTP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .top-nav {
    display: flex;
    align-items: center;
    padding: 16px 20px 0;
    flex-shrink: 0;
  }
  .back-btn {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.2);
    border: none; border-radius: 50%;
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; flex-shrink: 0;
  }
  .nav-title { flex: 1; text-align: center; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.9); }
  .nav-spacer { width: 34px; flex-shrink: 0; }

  /* Hero */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
    gap: 0;
    text-align: center;
  }
  .otp-icon {
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    margin-bottom: 20px;
  }
  .hero-title { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .hero-sub { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5; }
  .phone-display {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-top: 4px;
  }

  /* OTP boxes */
  .otp-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 32px;
  }
  .otp-box {
    width: 50px; height: 58px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 14px;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    text-align: center;
    outline: none;
    caret-color: transparent;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .otp-box:focus { border-color: #fff; background: rgba(255,255,255,0.25); }
  .otp-box.filled { background: rgba(255,255,255,0.25); }

  /* Timer */
  .timer-row {
    margin-top: 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }
  .resend-link {
    color: #FDE68A;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
  }
  .timer-count { font-weight: 700; color: #fff; }

  /* Verify button */
  .verify-btn {
    margin-top: 28px;
    width: 100%;
    height: 52px;
    background: #fff;
    color: #4F46E5;
    font-size: 16px;
    font-weight: 800;
    border: none;
    border-radius: 13px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Wrong number */
  .wrong-number {
    margin-top: 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    text-align: center;
  }
  .wrong-number a { color: rgba(255,255,255,0.9); font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }

  /* Auto-filled state (demo) */
  .demo-hint {
    margin-top: 16px;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="top-nav">
  <a class="back-btn" href="onboarding-signup.mockup.html">←</a>
  <div class="nav-title">Verify Number</div>
  <div class="nav-spacer"></div>
</div>

<div class="hero">
  <div class="otp-icon">📱</div>
  <div class="hero-title">Check your messages</div>
  <div class="hero-sub">We sent a 6-digit code to</div>
  <div class="phone-display">+91 98765 43210</div>

  <!-- OTP boxes -->
  <div class="otp-row">
    <input class="otp-box" id="d1" type="tel" maxlength="1" oninput="advance(this,'d2')" onkeydown="back(event,this,'d1')">
    <input class="otp-box" id="d2" type="tel" maxlength="1" oninput="advance(this,'d3')" onkeydown="back(event,this,'d1')">
    <input class="otp-box" id="d3" type="tel" maxlength="1" oninput="advance(this,'d4')" onkeydown="back(event,this,'d2')">
    <input class="otp-box" id="d4" type="tel" maxlength="1" oninput="advance(this,'d5')" onkeydown="back(event,this,'d3')">
    <input class="otp-box" id="d5" type="tel" maxlength="1" oninput="advance(this,'d6')" onkeydown="back(event,this,'d4')">
    <input class="otp-box" id="d6" type="tel" maxlength="1" oninput="advance(this,null)" onkeydown="back(event,this,'d5')">
  </div>

  <!-- Timer -->
  <div class="timer-row">
    Resend code in <span class="timer-count" id="timerDisplay">0:28</span>
    &nbsp;·&nbsp;
    <span class="resend-link" id="resendLink" style="display:none" onclick="resetTimer()">Resend</span>
  </div>

  <!-- Verify button -->
  <a class="verify-btn" href="onboarding-avatar.mockup.html?from=signup">Verify & Continue →</a>

  <div class="wrong-number">Wrong number? <a href="onboarding-signup.mockup.html">Change it</a></div>

  <div class="demo-hint">💡 Demo: Code is auto-read from SMS on supported devices. Tap any box to type manually.</div>
</div>

<script>
  // OTP box navigation
  function advance(el, nextId) {
    if (el.value.length === 1) {
      el.classList.add('filled');
      if (nextId) document.getElementById(nextId).focus();
    }
  }
  function back(event, el, prevId) {
    if (event.key === 'Backspace' && el.value === '') {
      document.getElementById(prevId)?.focus();
    }
  }

  // Countdown timer
  let seconds = 28;
  const timerEl = document.getElementById('timerDisplay');
  const resendEl = document.getElementById('resendLink');
  const interval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(interval);
      timerEl.style.display = 'none';
      resendEl.style.display = 'inline';
      document.querySelector('.timer-row').innerHTML = '<span class="resend-link" onclick="resetTimer()">Resend code</span>';
    } else {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      timerEl.textContent = m + ':' + String(s).padStart(2, '0');
    }
  }, 1000);

  function resetTimer() {
    seconds = 30;
    location.reload();
  }

  // Focus first box on load
  document.getElementById('d1').focus();
</script>
</body>
</html>
