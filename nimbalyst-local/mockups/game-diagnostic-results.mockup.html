<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceQuest - Diagnostic Results</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15), 0 10px 10px -5px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .hero {
      background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero-emoji { font-size: 40px; line-height: 1; flex-shrink: 0; }
    .hero-text { text-align: left; }
    .hero-title { font-size: 17px; font-weight: 800; color: #fff; line-height: 1.2; }
    .hero-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 3px; }

    .body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }

    .score-row { text-align: center; font-size: 13px; color: #6B7280; }
    .score-row strong { color: #111827; font-size: 15px; }

    .meter-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #9CA3AF; margin-bottom: 8px;
    }
    .meter-wrap { padding-bottom: 22px; }
    .meter { display: flex; gap: 4px; height: 48px; position: relative; }
    .meter-seg {
      flex: 1; border-radius: 10px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-size: 10px;
      font-weight: 700; text-align: center; line-height: 1.2;
      padding: 0 4px; position: relative;
    }
    .meter-seg.inactive { background: #E5E7EB; color: #9CA3AF; }
    .meter-seg.active {
      background: linear-gradient(135deg, #F59E0B, #D97706);
      color: #fff; box-shadow: 0 0 0 3px rgba(245,158,11,0.3); flex: 1.3;
    }
    .you-tag {
      position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
      font-size: 10px; font-weight: 700; color: #D97706; white-space: nowrap;
    }

    .chips { display: flex; gap: 8px; }
    .chip {
      flex: 1; background: #F3F4F6; border-radius: 12px;
      padding: 10px 8px; text-align: center; line-height: 1.3;
    }
    .chip-icon { font-size: 16px; display: block; margin-bottom: 3px; }
    .chip-label { font-size: 10px; color: #9CA3AF; font-weight: 600; display: block; }
    .chip-value { font-size: 13px; font-weight: 800; color: #374151; display: block; }

    .btn-primary {
      display: block; width: 100%; padding: 15px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff; font-size: 16px; font-weight: 700; border: none;
      border-radius: 14px; cursor: pointer; text-align: center;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .btn-ghost {
      display: block; width: 100%; text-align: center; font-size: 12px;
      color: #9CA3AF; background: none; border: none; cursor: pointer;
      padding: 8px 4px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <div class="hero-emoji">&#11088;</div>
      <div class="hero-text">
        <div class="hero-title">Diagnostic Complete! &#127881;</div>
        <div class="hero-sub">You already know some of this &mdash; nice work!</div>
      </div>
    </div>

    <div class="body">
      <div class="score-row">
        You answered <strong>5 of 7</strong> questions correctly
      </div>

      <div>
        <div class="meter-label">Your Knowledge Level</div>
        <div class="meter-wrap">
          <div class="meter">
            <div class="meter-seg inactive">Just<br>Starting</div>
            <div class="meter-seg active">
              Getting<br>There
              <div class="you-tag">&#9650; You are here</div>
            </div>
            <div class="meter-seg inactive">Level<br>Up!</div>
          </div>
        </div>
      </div>

      <div class="chips">
        <div class="chip">
          <span class="chip-icon">&#128218;</span>
          <span class="chip-label">Starting at</span>
          <span class="chip-value">Level 2</span>
        </div>
        <div class="chip">
          <span class="chip-icon">&#10067;</span>
          <span class="chip-label">Questions</span>
          <span class="chip-value">38</span>
        </div>
        <div class="chip">
          <span class="chip-icon">&#127918;</span>
          <span class="chip-label">Includes</span>
          <span class="chip-value">Mini-game</span>
        </div>
        <div class="chip">
          <span class="chip-icon">&#127910;</span>
          <span class="chip-label">Includes</span>
          <span class="chip-value">Video</span>
        </div>
      </div>

      <button class="btn-primary" onclick="window.location.href='game-play.mockup.html'">Let's Play! &#128640;</button>
      <button class="btn-ghost" onclick="window.location.href='game-diagnostic.mockup.html'">Restart from Level 1 instead</button>
    </div>
  </div>
</body>
</html>
