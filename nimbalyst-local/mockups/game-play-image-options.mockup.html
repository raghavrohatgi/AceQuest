<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceQuest - MCQ: Image Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hud {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px; flex-shrink: 0;
    }
    .hud-pause {
      width: 34px; height: 34px; background: rgba(255,255,255,0.25);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff; cursor: pointer; flex-shrink: 0;
    }
    .hud-center { flex: 1; }
    .hud-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 4px; }
    .hud-track { height: 5px; background: rgba(255,255,255,0.3); border-radius: 999px; overflow: hidden; }
    .hud-fill { height: 100%; width: 39%; background: #fff; border-radius: 999px; }
    .hud-xp {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 12px; font-weight: 700; padding: 5px 11px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }

    .streak {
      margin: 0 16px 10px;
      background: linear-gradient(135deg, #F59E0B, #D97706);
      border-radius: 10px; padding: 8px 14px;
      text-align: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
      }

    .question-card {
      flex: 1; background: #fff;
      border-radius: 20px;
      margin: 0 16px 0;
      padding: 18px 18px 12px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .topic-badge {
      background: #EEF2FF; color: #4338CA;
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }
    .voice-btn {
      width: 32px; height: 32px; background: #F3F4F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; flex-shrink: 0;
    }

    .question-text { font-size: 20px; font-weight: 700; color: #111827; line-height: 1.3; }
    .question-sub { font-size: 13px; color: #6B7280; }

    /* Image option grid */
    .image-option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }

    .img-option {
      border: 2.5px solid #E5E7EB;
      border-radius: 16px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; padding: 14px 10px;
      cursor: pointer;
      background: #fff;
      position: relative;
    }
    .img-option.selected {
      border-color: #6366F1;
      background: #EEF2FF;
    }
    .img-option .opt-letter {
      position: absolute; top: 8px; left: 10px;
      font-size: 10px; font-weight: 700; color: #9CA3AF;
    }
    .img-option.selected .opt-letter { color: #6366F1; }
    .img-option .opt-label {
      font-size: 12px; font-weight: 600; color: #6B7280; text-align: center;
    }
    .img-option.selected .opt-label { color: #4338CA; }

    /* CSS shapes */
    .shape-wrap {
      width: 70px; height: 70px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Square */
    .shape-square {
      width: 54px; height: 54px;
      border: 3px solid #6366F1;
      background: #EEF2FF;
      border-radius: 4px;
    }
    .img-option.selected .shape-square {
      background: #C7D2FE;
    }

    /* Rectangle */
    .shape-rect {
      width: 70px; height: 38px;
      border: 3px solid #374151;
      background: #F3F4F6;
      border-radius: 4px;
    }

    /* Triangle */
    .shape-triangle {
      width: 0; height: 0;
      border-left: 30px solid transparent;
      border-right: 30px solid transparent;
      border-bottom: 52px solid #374151;
      position: relative;
    }
    .shape-triangle::after {
      content: '';
      position: absolute;
      top: 8px; left: -24px;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-bottom: 41px solid #F3F4F6;
    }

    /* Circle */
    .shape-circle {
      width: 54px; height: 54px;
      border: 3px solid #374151;
      background: #F3F4F6;
      border-radius: 50%;
    }

    .bottom-section {
      background: transparent; padding: 10px 32px 20px;
      flex-shrink: 0;
    }
    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff; font-size: 15px; font-weight: 700;
      border: none; border-radius: 13px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="hud-pause" onclick="window.location.href='game-pre-game.mockup.html'">&#9616;&#9616;</div>
    <div class="hud-center">
      <div class="hud-label">Q 15 / 38</div>
      <div class="hud-track"><div class="hud-fill"></div></div>
    </div>
    <div class="hud-xp">&#11088; 180 XP</div>
  </div>

  <div class="streak">&#128293; 5x Combo! Amazing!</div>

  <div class="question-card">
    <div class="card-top">
      <div class="topic-badge">&#9651; Shapes</div>
      <div class="voice-btn" title="Listen to question">&#128266;</div>
    </div>

    <div class="question-text">Which shape has exactly 4 equal sides?</div>
    <div class="question-sub">Tap the correct shape below</div>

    <div class="image-option-grid">
      <!-- A: Square (correct, selected) -->
      <div class="img-option selected">
        <span class="opt-letter">A</span>
        <div class="shape-wrap"><div class="shape-square"></div></div>
        <div class="opt-label">Square</div>
      </div>
      <!-- B: Rectangle -->
      <div class="img-option">
        <span class="opt-letter">B</span>
        <div class="shape-wrap"><div class="shape-rect"></div></div>
        <div class="opt-label">Rectangle</div>
      </div>
      <!-- C: Triangle -->
      <div class="img-option">
        <span class="opt-letter">C</span>
        <div class="shape-wrap"><div class="shape-triangle"></div></div>
        <div class="opt-label">Triangle</div>
      </div>
      <!-- D: Circle -->
      <div class="img-option">
        <span class="opt-letter">D</span>
        <div class="shape-wrap"><div class="shape-circle"></div></div>
        <div class="opt-label">Circle</div>
      </div>
    </div>
  </div>

  <div class="bottom-section">
    <button class="btn-submit" onclick="window.location.href='game-play-fitb.mockup.html'">Next Question &#8594;</button>
  </div>
</body>
</html>
