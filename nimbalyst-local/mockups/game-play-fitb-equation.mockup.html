<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceQuest - FITB Equation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .hud { display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px; flex-shrink: 0; }
    .hud-pause { width: 34px; height: 34px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #fff; cursor: pointer; flex-shrink: 0; }
    .hud-center { flex: 1; }
    .hud-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 4px; }
    .hud-track { height: 5px; background: rgba(255,255,255,0.3); border-radius: 999px; overflow: hidden; }
    .hud-fill { height: 100%; width: 55%; background: #fff; border-radius: 999px; }
    .hud-xp { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
    .streak { margin: 0 16px 10px; background: linear-gradient(135deg, #F59E0B, #D97706); border-radius: 10px; padding: 8px 14px; text-align: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .question-card { flex: 1; background: #fff; border-radius: 20px; margin: 0 16px 0; padding: 18px 18px 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
    .topic-badge { background: #FEF3C7; color: #92400E; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .voice-btn { width: 32px; height: 32px; background: #F3F4F6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; flex-shrink: 0; }
    .q-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #9CA3AF; }
    .q-text { font-size: 16px; font-weight: 500; color: #374151; line-height: 1.5; }
    /* Equation display */
    .equation-box { background: #FAFAFA; border: 1.5px solid #E5E7EB; border-radius: 14px; padding: 20px 24px; display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .eq-part { font-size: 32px; font-weight: 700; color: #111827; font-family: 'Georgia', serif; }
    .eq-op { font-size: 28px; font-weight: 400; color: #6B7280; }
    .eq-blank { display: inline-flex; align-items: center; justify-content: center; min-width: 64px; height: 52px; border: 2.5px dashed #9CA3AF; background: #F9FAFB; border-radius: 10px; font-size: 30px; font-weight: 700; color: #9CA3AF; cursor: pointer; padding: 0 12px; transition: all 0.15s; font-family: 'Georgia', serif; }
    .eq-blank.filled { border-style: solid; border-color: #6366F1; background: #EEF2FF; color: #4338CA; }
    .eq-blank.correct { border-color: #22C55E; background: #F0FDF4; color: #16A34A; }
    .eq-blank.wrong { border-color: #EF4444; background: #FEF2F2; color: #DC2626; text-decoration: line-through; }
    .hint-box { background: #FFF7ED; border: 1.5px solid #FED7AA; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #9A3412; }
    .wb-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #9CA3AF; }
    /* Numeric keypad */
    .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .num-key { background: #F3F4F6; border: 2px solid #D1D5DB; border-radius: 10px; padding: 12px 6px; font-size: 20px; font-weight: 700; color: #374151; cursor: pointer; transition: all 0.15s; user-select: none; font-family: 'Georgia', serif; text-align: center; }
    .num-key:hover { border-color: #6366F1; background: #EEF2FF; color: #4338CA; }
    .num-key:active { transform: scale(0.94); }
    .num-key.del { background: #FEF2F2; border-color: #FCA5A5; color: #DC2626; font-size: 18px; grid-column: span 2; }
    .num-key.del:hover { background: #FEE2E2; border-color: #EF4444; }
    .feedback-banner { border-radius: 12px; padding: 12px 14px; display: none; }
    .feedback-banner.ok { background: #F0FDF4; border: 1.5px solid #86EFAC; }
    .feedback-banner.err { background: #FEF2F2; border: 1.5px solid #FCA5A5; }
    .fb-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .fb-label { font-size: 13px; font-weight: 700; }
    .fb-label.c { color: #16A34A; } .fb-label.w { color: #DC2626; }
    .xp-badge { background: linear-gradient(135deg, #F59E0B, #D97706); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px; }
    .fb-exp { font-size: 12px; color: #4B5563; line-height: 1.5; }
    .bottom-section { background: transparent; padding: 10px 32px 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
    .btn-submit { width: 100%; padding: 14px; background: #D1D5DB; color: #9CA3AF; font-size: 15px; font-weight: 700; border: none; border-radius: 13px; cursor: not-allowed; text-align: center; transition: all 0.2s; }
    .btn-submit.active { background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; cursor: pointer; box-shadow: 0 4px 14px rgba(99,102,241,0.4); }
    .btn-next { display: none; width: 100%; padding: 14px; background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; font-size: 15px; font-weight: 700; border: none; border-radius: 13px; cursor: pointer; box-shadow: 0 4px 14px rgba(99,102,241,0.4); }
  </style>
</head>
<body>
  <div class="hud">
    <div class="hud-pause">&#9616;&#9616;</div>
    <div class="hud-center">
      <div class="hud-label">Q 21 / 38</div>
      <div class="hud-track"><div class="hud-fill"></div></div>
    </div>
    <div class="hud-xp">&#11088; 260 XP</div>
  </div>
  <div class="streak">&#128293; 3x Combo!</div>
  <div class="question-card">
    <div class="card-top">
      <div class="topic-badge">&#10133; Mathematics</div>
      <div class="voice-btn">&#128266;</div>
    </div>
    <div class="q-label">Fill in the blank</div>
    <div class="q-text">Complete the equation by finding the missing number.</div>

    <div class="equation-box">
      <span class="eq-part">3</span>
      <span class="eq-op">&times;</span>
      <span class="eq-blank" id="b1" onclick="selectBlank('b1')">?</span>
      <span class="eq-op">=</span>
      <span class="eq-part">12</span>
    </div>

    <div class="hint-box">&#128161; Think: what number multiplied by 3 gives 12?</div>

    <div class="wb-label">Enter the missing number</div>
    <div class="numpad">
      <div class="num-key" onclick="pressKey('1')">1</div>
      <div class="num-key" onclick="pressKey('2')">2</div>
      <div class="num-key" onclick="pressKey('3')">3</div>
      <div class="num-key" onclick="pressKey('4')">4</div>
      <div class="num-key" onclick="pressKey('5')">5</div>
      <div class="num-key" onclick="pressKey('6')">6</div>
      <div class="num-key" onclick="pressKey('7')">7</div>
      <div class="num-key" onclick="pressKey('8')">8</div>
      <div class="num-key" onclick="pressKey('9')">9</div>
      <div class="num-key" onclick="pressKey('0')">0</div>
      <div class="num-key del" onclick="clearBlank()">&#9003; Clear</div>
    </div>

    <div class="feedback-banner" id="fb">
      <div class="fb-top">
        <div class="fb-label c" id="fbl">&#10003; Correct!</div>
        <div class="xp-badge" id="xpb">+15 XP</div>
      </div>
      <div class="fb-exp" id="fb-exp">3 &times; 4 = 12. Division is the inverse: 12 &divide; 3 = 4.</div>
    </div>
  </div>
  <div class="bottom-section">
    <button class="btn-submit" id="sub" onclick="check()">Check Answer &#8594;</button>
    <button class="btn-next" id="nxt" onclick="window.location.href='game-play-fitb-typed.mockup.html'">Next Question &#8594;</button>
  </div>
  <script>
    let current = '';
    const b = document.getElementById('b1');
    function pressKey(digit) {
      if (current.length >= 3) return; // max 3 digits
      current += digit;
      b.textContent = current;
      b.classList.add('filled');
      document.getElementById('sub').classList.add('active');
    }
    function clearBlank() {
      current = '';
      b.textContent = '?';
      b.classList.remove('filled');
      document.getElementById('sub').classList.remove('active');
    }
    function check() {
      if (!current) return;
      const ok = current === '4';
      b.classList.remove('filled'); b.classList.add(ok ? 'correct' : 'wrong');
      const fb = document.getElementById('fb');
      fb.style.display = 'block'; fb.className = 'feedback-banner ' + (ok ? 'ok' : 'err');
      document.getElementById('fbl').className = 'fb-label ' + (ok ? 'c' : 'w');
      document.getElementById('fbl').textContent = ok ? '\u2713 Correct! Well done!' : '\u2717 The answer is 4';
      document.getElementById('xpb').style.display = ok ? 'inline-block' : 'none';
      if (!ok) document.getElementById('fb-exp').textContent = '3 \u00d7 4 = 12. Try division: 12 \u00f7 3 = 4.';
      document.getElementById('sub').style.display = 'none';
      document.getElementById('nxt').style.display = 'block';
      // Disable keypad after answer
      document.querySelectorAll('.num-key').forEach(k => k.style.pointerEvents = 'none');
    }
  </script>
</body>
</html>
