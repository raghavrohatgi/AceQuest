<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AceQuest — Passage Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Gujarati:wght@400;600;700&family=Noto+Sans+Gurmukhi:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Devanagari', 'Noto Sans Gujarati', 'Noto Sans Gurmukhi', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HUD */
  .hud {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 10px;
    flex-shrink: 0;
  }
  .pause-btn {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .progress-label {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    font-weight: 600;
    text-align: center;
  }
  .progress-track {
    height: 7px;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 52.6%;
    background: #fff;
    border-radius: 999px;
  }
  .xp-badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 999px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* White card */
  .card {
    flex: 1;
    background: #fff;
    border-radius: 20px;
    margin: 0 16px 0;
    padding: 14px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
  }

  /* Card top row */
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topic-badge {
    background: #ECFDF5;
    color: #065F46;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 999px;
  }
  .voice-btn {
    width: 32px; height: 32px;
    background: #F3F4F6;
    border: none;
    border-radius: 50%;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Cover image block */
  .cover-image {
    height: 150px;
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(135deg, #6EE7B7, #3B82F6);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    position: relative;
    flex-shrink: 0;
  }
  .cover-emoji {
    font-size: 40px;
  }
  .cover-title {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    padding: 0 12px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .cover-pill {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(255,255,255,0.9);
    color: #374151;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
  }

  /* Card body */
  .passage-title {
    font-size: 18px;
    font-weight: 700;
    color: #111827;
    line-height: 1.3;
    text-align: center;
  }
  .source-row {
    font-size: 12px;
    color: #6B7280;
    text-align: center;
  }
  .description {
    font-size: 13px;
    color: #6B7280;
    line-height: 1.5;
    text-align: center;
  }
  .stats-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-chip {
    background: #F3F4F6;
    color: #374151;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
  }

  /* Bottom section */
  .bottom {
    background: transparent;
    padding: 10px 16px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6366F1, #4F46E5);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 13px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    text-decoration: none;
    display: block;
    text-align: center;
  }
  .btn-primary:hover { opacity: 0.93; }
</style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <button class="pause-btn">⏸</button>
  <div class="progress-wrap">
    <div class="progress-label">Q 20 / 38</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>
  <div class="xp-badge">⚡ 240 XP</div>
</div>

<!-- White Card -->
<div class="card">
  <!-- Card top -->
  <div class="card-top">
    <span class="topic-badge">📖 English</span>
    <button class="voice-btn">🔊</button>
  </div>

  <!-- Cover image -->
  <div class="cover-image">
    <div class="cover-emoji">🌿</div>
    <div class="cover-title">The Amazon Rainforest</div>
    <div class="cover-pill">Reading Passage</div>
  </div>

  <!-- Title -->
  <div class="passage-title">The Amazon Rainforest</div>

  <!-- Source -->
  <div class="source-row">🏷️ Source: National Geographic for Kids</div>

  <!-- Description -->
  <div class="description">Read the passage and answer 4 questions about the Amazon ecosystem.</div>

  <!-- Stats row -->
  <div class="stats-row">
    <span class="stat-chip">📄 4 Questions</span>
    <span class="stat-chip">⏱ ~5 min</span>
    <span class="stat-chip">🌟 +60 XP</span>
  </div>

</div>

<!-- Bottom Section -->
<div class="bottom">
  <a class="btn-primary" href="game-play-passage-text.mockup.html">Start Reading →</a>
</div>

</body>
</html>
