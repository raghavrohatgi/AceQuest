<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceQuest - Gameplay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HUD */
    .hud {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px; flex-shrink: 0;
    }
    .hud-pause {
      width: 34px; height: 34px; background: rgba(255,255,255,0.25);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff; cursor: pointer; flex-shrink: 0;
    }
    .hud-center { flex: 1; }
    .hud-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 4px; }
    .hud-track { height: 5px; background: rgba(255,255,255,0.3); border-radius: 999px; overflow: hidden; }
    .hud-fill { height: 100%; width: 31.6%; background: #fff; border-radius: 999px; }
    .hud-xp {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 12px; font-weight: 700; padding: 5px 11px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }

    /* Streak */
    .streak {
      margin: 0 16px 10px;
      background: linear-gradient(135deg, #F59E0B, #D97706);
      border-radius: 10px; padding: 8px 14px;
      text-align: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    /* Question card */
    .question-card {
      flex: 1; background: #fff;
      border-radius: 20px;
      margin: 0 16px 0;
      padding: 18px 18px 12px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .topic-badge {
      background: #EEF2FF; color: #4338CA;
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }
    .voice-btn {
      width: 32px; height: 32px; background: #F3F4F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; flex-shrink: 0;
    }

    .question-text { font-size: 22px; font-weight: 700; color: #111827; line-height: 1.3; }

    /* Answer grid */
    .answer-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .answer-option {
      border: 2px solid #9CA3AF; border-radius: 12px;
      padding: 14px 12px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; background: #F9FAFB;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .answer-option:hover:not(.locked) { border-color: #A5B4FC; background: #F5F3FF; }
    .answer-letter { font-size: 11px; font-weight: 800; color: #6B7280; width: 16px; flex-shrink: 0; }
    .answer-value { font-size: 16px; font-weight: 700; color: #111827; }
    .answer-icon { margin-left: auto; font-size: 16px; display: none; }

    /* Selected */
    .answer-option.selected { border-color: #6366F1; background: #EEF2FF; }
    .answer-option.selected .answer-letter { color: #6366F1; }
    .answer-option.selected .answer-value { color: #4338CA; }

    /* After submit */
    .answer-option.correct { background: #F0FDF4; border-color: #22C55E; }
    .answer-option.correct .answer-value { color: #16A34A; }
    .answer-option.correct .answer-letter { color: #22C55E; }
    .answer-option.correct .answer-icon { display: block; }

    .answer-option.wrong { background: #FEF2F2; border-color: #EF4444; }
    .answer-option.wrong .answer-value { color: #DC2626; }
    .answer-option.wrong .answer-letter { color: #EF4444; }
    .answer-option.wrong .answer-icon { display: block; }

    .answer-option.dim { background: #F9FAFB; border-color: #E5E7EB; opacity: 0.5; }
    .answer-option.dim .answer-value { color: #9CA3AF; }

    /* Feedback banner */
    .feedback-banner {
      background: #F0FDF4; border: 1.5px solid #86EFAC;
      border-radius: 12px; padding: 12px 14px; display: none;
    }
    .feedback-banner.wrong-feedback { background: #FEF2F2; border-color: #FCA5A5; }
    .feedback-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .feedback-label { font-size: 13px; font-weight: 700; color: #16A34A; }
    .feedback-label.wrong { color: #DC2626; }
    .xp-badge {
      background: linear-gradient(135deg, #F59E0B, #D97706);
      color: #fff; font-size: 11px; font-weight: 700;
      padding: 2px 9px; border-radius: 999px;
    }
    .feedback-explanation { font-size: 12px; color: #4B5563; line-height: 1.5; }

    /* Bottom section */
    .bottom-section {
      background: transparent; padding: 10px 32px 20px;
      flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
    }

    .btn-submit {
      width: 100%; padding: 14px;
      background: #D1D5DB; color: #9CA3AF;
      font-size: 15px; font-weight: 700; border: none;
      border-radius: 13px; cursor: not-allowed; text-align: center;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-submit.active {
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .btn-next {
      display: none; width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff; font-size: 15px; font-weight: 700;
      border: none; border-radius: 13px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
  </style>
</head>
<body>
  <!-- HUD -->
  <div class="hud">
    <div class="hud-pause">&#9616;&#9616;</div>
    <div class="hud-center">
      <div class="hud-label">Q 12 / 38</div>
      <div class="hud-track"><div class="hud-fill"></div></div>
    </div>
    <div class="hud-xp">&#11088; 120 XP</div>
  </div>

  <!-- Streak -->
  <div class="streak">&#128293; 4x Combo! Keep it up!</div>

  <!-- Question card -->
  <div class="question-card">
    <div class="card-top">
      <div class="topic-badge">&#10006; Multiplication</div>
      <div class="voice-btn" title="Listen to question">&#128266;</div>
    </div>

    <div class="question-text">What is 9 &#215; 7?</div>

    <div class="answer-grid" id="answerGrid">
      <div class="answer-option" data-index="0" onclick="selectAnswer(this)">
        <span class="answer-letter">A</span>
        <span class="answer-value">56</span>
        <span class="answer-icon">&#10007;</span>
      </div>
      <div class="answer-option" data-index="1" data-correct="true" onclick="selectAnswer(this)">
        <span class="answer-letter">B</span>
        <span class="answer-value">63</span>
        <span class="answer-icon">&#10003;</span>
      </div>
      <div class="answer-option" data-index="2" onclick="selectAnswer(this)">
        <span class="answer-letter">C</span>
        <span class="answer-value">72</span>
        <span class="answer-icon">&#10007;</span>
      </div>
      <div class="answer-option" data-index="3" onclick="selectAnswer(this)">
        <span class="answer-letter">D</span>
        <span class="answer-value">54</span>
        <span class="answer-icon">&#10007;</span>
      </div>
    </div>

    <!-- Feedback (shown after submit) -->
    <div class="feedback-banner" id="feedbackBanner">
      <div class="feedback-top">
        <div class="feedback-label" id="feedbackLabel">&#10003; Correct! Well done!</div>
        <div class="xp-badge" id="xpBadge">+15 XP</div>
      </div>
      <div class="feedback-explanation" id="feedbackExplanation">
        9 &#215; 7 = 63. Try the 9-times trick: for 9&#215;n, the digits always add up to 9. So 9&#215;7 = 63 (6+3=9)!
      </div>
    </div>
  </div>

  <!-- Bottom buttons -->
  <div class="bottom-section">
    <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">Check Answer &#8594;</button>
    <button class="btn-next" id="nextBtn" onclick="window.location.href='game-play-text-image.mockup.html'">Next Question &#8594;</button>
  </div>

  <script>
    let selectedOption = null;

    function selectAnswer(el) {
      if (document.getElementById('submitBtn').style.display === 'none') return;
      if (selectedOption) selectedOption.classList.remove('selected');
      el.classList.add('selected');
      selectedOption = el;
      document.getElementById('submitBtn').classList.add('active');
    }

    function submitAnswer() {
      if (!selectedOption) return;
      const isCorrect = selectedOption.dataset.correct === 'true';

      document.querySelectorAll('.answer-option').forEach(opt => {
        opt.onclick = null;
        opt.classList.remove('selected');
        if (opt.dataset.correct === 'true') {
          opt.classList.add('correct');
        } else if (opt === selectedOption && !isCorrect) {
          opt.classList.add('wrong');
        } else {
          opt.classList.add('dim');
        }
      });

      const banner = document.getElementById('feedbackBanner');
      const label = document.getElementById('feedbackLabel');
      const xpBadge = document.getElementById('xpBadge');
      banner.style.display = 'block';

      if (isCorrect) {
        banner.classList.remove('wrong-feedback');
        label.className = 'feedback-label';
        label.textContent = '✓ Correct! Well done!';
        xpBadge.style.display = 'inline-block';
      } else {
        banner.classList.add('wrong-feedback');
        label.className = 'feedback-label wrong';
        label.textContent = '✗ Not quite — the correct answer is 63';
        xpBadge.style.display = 'none';
      }

      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'block';
    }
  </script>
</body>
</html>
