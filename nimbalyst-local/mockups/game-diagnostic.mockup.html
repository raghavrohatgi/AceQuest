<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceQuest - Diagnostic Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HUD */
    .hud {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px; flex-shrink: 0;
    }
    .hud-back {
      width: 34px; height: 34px; background: rgba(255,255,255,0.25);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #fff; cursor: pointer; flex-shrink: 0;
    }
    .hud-center { flex: 1; }
    .hud-title {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9);
      text-align: center; margin-bottom: 4px;
    }
    .hud-track { height: 5px; background: rgba(255,255,255,0.3); border-radius: 999px; overflow: hidden; }
    .hud-fill { height: 100%; width: 42.86%; background: #fff; border-radius: 999px; }
    .hud-pill {
      background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 12px; font-weight: 700; padding: 5px 11px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }

    /* Mascot banner */
    .mascot-banner {
      margin: 0 16px 10px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .mascot-emoji { font-size: 26px; flex-shrink: 0; }
    .mascot-text { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; line-height: 1.4; }

    /* Question card */
    .question-card {
      flex: 1; background: #fff;
      border-radius: 20px;
      margin: 0 16px 0;
      padding: 18px 18px 12px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .topic-badge {
      background: #EEF2FF; color: #4338CA;
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }
    .voice-btn {
      width: 32px; height: 32px; background: #F3F4F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; flex-shrink: 0;
    }

    .question-text { font-size: 22px; font-weight: 700; color: #111827; line-height: 1.3; }

    /* Answer grid */
    .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .answer-option {
      border: 2px solid #9CA3AF; border-radius: 12px;
      padding: 14px 12px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; background: #F9FAFB;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .answer-option:hover { border-color: #A5B4FC; background: #F5F3FF; }
    .answer-letter { font-size: 11px; font-weight: 800; color: #6B7280; width: 16px; flex-shrink: 0; }
    .answer-value { font-size: 16px; font-weight: 700; color: #111827; }

    .answer-option.selected { border-color: #6366F1; background: #EEF2FF; }
    .answer-option.selected .answer-letter { color: #6366F1; }
    .answer-option.selected .answer-value { color: #4338CA; }

    /* Bottom section */
    .bottom-section {
      background: transparent; padding: 10px 32px 20px;
      flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
    }

    .btn-submit {
      width: 100%; padding: 14px;
      background: #D1D5DB; color: #9CA3AF;
      font-size: 15px; font-weight: 700; border: none;
      border-radius: 13px; cursor: not-allowed; text-align: center;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-submit.active {
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
  </style>
</head>
<body>
  <!-- HUD -->
  <div class="hud">
    <div class="hud-back" onclick="window.location.href='game-pre-game.mockup.html'">&#8592;</div>
    <div class="hud-center">
      <div class="hud-title">Diagnostic: Multiplication Master</div>
      <div class="hud-track"><div class="hud-fill"></div></div>
    </div>
    <div class="hud-pill">Q 3 of 7</div>
  </div>

  <!-- Mascot -->
  <div class="mascot-banner">
    <div class="mascot-emoji">&#129302;</div>
    <div class="mascot-text">No grades here &#8212; just helping us personalize your adventure! &#128640;</div>
  </div>

  <!-- Question card -->
  <div class="question-card">
    <div class="card-top">
      <div class="topic-badge">&#10006; Multiplication</div>
      <div class="voice-btn" title="Listen to question">&#128266;</div>
    </div>

    <div class="question-text">What is 7 &#215; 8?</div>

    <div class="answer-grid" id="answerGrid">
      <div class="answer-option" onclick="selectAnswer(this)">
        <span class="answer-letter">A</span>
        <span class="answer-value">54</span>
      </div>
      <div class="answer-option selected" onclick="selectAnswer(this)">
        <span class="answer-letter">B</span>
        <span class="answer-value">56</span>
      </div>
      <div class="answer-option" onclick="selectAnswer(this)">
        <span class="answer-letter">C</span>
        <span class="answer-value">63</span>
      </div>
      <div class="answer-option" onclick="selectAnswer(this)">
        <span class="answer-letter">D</span>
        <span class="answer-value">48</span>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <button class="btn-submit active" id="submitBtn" onclick="window.location.href='game-diagnostic-results.mockup.html'">Check Answer &#8594;</button>
  </div>

  <script>
    let selected = document.querySelector('.answer-option.selected');

    function selectAnswer(el) {
      if (selected) selected.classList.remove('selected');
      el.classList.add('selected');
      selected = el;
      document.getElementById('submitBtn').classList.add('active');
      document.getElementById('submitBtn').style.cursor = 'pointer';
    }
  </script>
</body>
</html>
