<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AceQuest — How to Play (2/3)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .skip-row {
    display: flex;
    justify-content: flex-end;
    padding: 16px 20px 0;
    flex-shrink: 0;
  }
  .skip-btn {
    background: rgba(255,255,255,0.2);
    border: none; border-radius: 999px;
    color: rgba(255,255,255,0.85);
    font-size: 12px; font-weight: 700;
    padding: 6px 14px; cursor: pointer;
    text-decoration: none;
  }
  .illustration {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    gap: 16px;
  }

  /* Mock leaderboard */
  .mock-leaderboard {
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .lb-title { font-size: 13px; font-weight: 800; color: #111827; text-align: center; margin-bottom: 4px; }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    background: #F9FAFB;
  }
  .lb-row.you { background: #EEF2FF; border: 1.5px solid #6366F1; }
  .lb-rank { font-size: 16px; font-weight: 800; color: #6B7280; width: 24px; text-align: center; flex-shrink: 0; }
  .lb-avatar { font-size: 20px; flex-shrink: 0; }
  .lb-name { flex: 1; font-size: 13px; font-weight: 700; color: #111827; }
  .lb-xp { font-size: 12px; font-weight: 800; color: #6366F1; }
  .lb-row.you .lb-name { color: #4F46E5; }

  .bottom-card {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 36px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .step-dots { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #E5E7EB; }
  .dot.active { background: #10B981; width: 24px; border-radius: 4px; }
  .step-label { font-size: 11px; font-weight: 800; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.08em; text-align: center; }
  .step-title { font-size: 22px; font-weight: 800; color: #111827; text-align: center; line-height: 1.3; }
  .step-desc { font-size: 14px; color: #6B7280; text-align: center; line-height: 1.6; }
  .rewards-row { display: flex; gap: 10px; justify-content: center; }
  .reward-chip {
    display: flex; align-items: center; gap: 6px;
    background: #F0FDF4; border-radius: 999px;
    padding: 6px 14px; font-size: 12px;
    font-weight: 700; color: #065F46;
  }
  .btn-primary {
    width: 100%; height: 52px;
    background: linear-gradient(135deg, #10B981, #059669);
    color: #fff; font-size: 16px; font-weight: 800;
    border: none; border-radius: 13px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(16,185,129,0.4);
    text-decoration: none;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div class="skip-row">
  <a class="skip-btn" href="student-home-first-time.mockup.html">Skip tutorial →</a>
</div>

<div class="illustration">
  <div class="mock-leaderboard">
    <div class="lb-title">🏆 Weekly Leaderboard</div>
    <div class="lb-row">
      <div class="lb-rank">🥇</div>
      <div class="lb-avatar">🦄</div>
      <div class="lb-name">Priya</div>
      <div class="lb-xp">3,200 XP</div>
    </div>
    <div class="lb-row">
      <div class="lb-rank">🥈</div>
      <div class="lb-avatar">🐼</div>
      <div class="lb-name">Rohan</div>
      <div class="lb-xp">2,850 XP</div>
    </div>
    <div class="lb-row you">
      <div class="lb-rank">🥉</div>
      <div class="lb-avatar">🦁</div>
      <div class="lb-name">You (Arjun)</div>
      <div class="lb-xp">2,480 XP</div>
    </div>
    <div class="lb-row">
      <div class="lb-rank" style="font-size:13px">4</div>
      <div class="lb-avatar">🐯</div>
      <div class="lb-name">Sneha</div>
      <div class="lb-xp">1,920 XP</div>
    </div>
  </div>
</div>

<div class="bottom-card">
  <div class="step-dots">
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>
  <div class="step-label">Step 2 of 3</div>
  <div class="step-title">Compete on the leaderboard!</div>
  <div class="step-desc">See where you stand among your classmates. Play more games to climb the ranks and win weekly prizes!</div>
  <div class="rewards-row">
    <div class="reward-chip">🏆 Weekly rewards</div>
    <div class="reward-chip">👥 Beat friends</div>
  </div>
  <a class="btn-primary" href="onboarding-tutorial-3.mockup.html">Next →</a>
</div>

</body>
</html>
