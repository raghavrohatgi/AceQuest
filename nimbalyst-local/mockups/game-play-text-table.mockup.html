<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceQuest - MCQ: Text + Table</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hud {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px; flex-shrink: 0;
    }
    .hud-pause {
      width: 34px; height: 34px; background: rgba(255,255,255,0.25);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff; cursor: pointer; flex-shrink: 0;
    }
    .hud-center { flex: 1; }
    .hud-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 4px; }
    .hud-track { height: 5px; background: rgba(255,255,255,0.3); border-radius: 999px; overflow: hidden; }
    .hud-fill { height: 100%; width: 29%; background: #fff; border-radius: 999px; }
    .hud-xp {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 12px; font-weight: 700; padding: 5px 11px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }

    .streak {
      margin: 0 16px 10px;
      background: linear-gradient(135deg, #F59E0B, #D97706);
      border-radius: 10px; padding: 8px 14px;
      text-align: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    .question-card {
      flex: 1; background: #fff;
      border-radius: 20px;
      margin: 0 16px 0;
      padding: 18px 18px 12px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 12px;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .topic-badge {
      background: #EEF2FF; color: #4338CA;
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }
    .voice-btn {
      width: 32px; height: 32px; background: #F3F4F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; flex-shrink: 0;
    }

    .question-text { font-size: 20px; font-weight: 700; color: #111827; line-height: 1.3; }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #E5E7EB;
      font-size: 13px;
    }
    .data-table th {
      background: #EEF2FF;
      color: #4338CA;
      font-weight: 700;
      padding: 9px 12px;
      text-align: left;
    }
    .data-table td {
      padding: 9px 12px;
      color: #374151;
      font-weight: 500;
      border-top: 1px solid #F3F4F6;
    }
    .data-table tr:nth-child(even) td { background: #F9FAFB; }
    .data-table tr:last-child td { border-bottom: none; }

    .bottom-section {
      background: transparent; padding: 10px 32px 20px;
      flex-shrink: 0; display: flex; flex-direction: column; gap: 10px;
    }
    .divider { height: 1px; background: #F3F4F6; margin-bottom: 2px; }

    .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .answer-option {
      border: 2px solid #9CA3AF; border-radius: 12px;
      padding: 12px 10px; display: flex; align-items: center; gap: 8px; cursor: pointer;
      background: #F9FAFB;
    }
    .answer-option.selected { border-color: #6366F1; background: #EEF2FF; }
    .answer-letter { font-size: 11px; font-weight: 800; color: #6B7280; width: 16px; flex-shrink: 0; }
    .answer-option.selected .answer-letter { color: #6366F1; }
    .answer-value { font-size: 15px; font-weight: 700; color: #111827; }
    .answer-option.selected .answer-value { color: #4338CA; }

    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff; font-size: 15px; font-weight: 700;
      border: none; border-radius: 13px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="hud-pause" onclick="window.location.href='game-pre-game.mockup.html'">&#9616;&#9616;</div>
    <div class="hud-center">
      <div class="hud-label">Q 11 / 38</div>
      <div class="hud-track"><div class="hud-fill"></div></div>
    </div>
    <div class="hud-xp">&#11088; 130 XP</div>
  </div>

  <div class="streak">&#128293; 2x Combo!</div>

  <div class="question-card">
    <div class="card-top">
      <div class="topic-badge">&#10006; Maths</div>
      <div class="voice-btn" title="Listen to question">&#128266;</div>
    </div>

    <div class="question-text">Which student scored the highest total across both tests?</div>

    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Test 1</th>
          <th>Test 2</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Alice</td><td>85</td><td>90</td><td>175</td></tr>
        <tr><td>Bob</td><td>78</td><td>88</td><td>166</td></tr>
        <tr><td>Charlie</td><td>92</td><td>87</td><td>179</td></tr>
        <tr><td>Diana</td><td>80</td><td>95</td><td>175</td></tr>
      </tbody>
    </table>
  </div>

  <div class="bottom-section">
    <div class="divider"></div>
    <div class="answer-grid">
      <div class="answer-option">
        <span class="answer-letter">A</span>
        <span class="answer-value">Alice</span>
      </div>
      <div class="answer-option">
        <span class="answer-letter">B</span>
        <span class="answer-value">Bob</span>
      </div>
      <div class="answer-option selected">
        <span class="answer-letter">C</span>
        <span class="answer-value">Charlie</span>
      </div>
      <div class="answer-option">
        <span class="answer-letter">D</span>
        <span class="answer-value">Diana</span>
      </div>
    </div>
    <button class="btn-submit" onclick="window.location.href='game-play-long-content.mockup.html'">Check Answer &#8594;</button>
  </div>
</body>
</html>
